<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Speed Boxing — ADHD LAB</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    color: #fff;
    font-family: 'Fredoka', sans-serif;
    overflow: hidden;
    height: 100%;
    touch-action: none;
  }
  #hud {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.5rem;
    z-index: 5;
    pointer-events: none;
  }
  #hud a {
    pointer-events: auto;
    color: #00F7FF;
    text-decoration: none;
    font-weight: 600;
    font-size: 0.9rem;
    border: 1px solid #00F7FF;
    padding: 0.4rem 0.9rem;
    border-radius: 999px;
    transition: all 0.2s ease;
  }
  #hud a:hover {
    background: #00F7FF;
    color: #000;
  }
  #stats {
    text-align: right;
    line-height: 1.3;
  }
  #stats .label {
    font-size: 0.65rem;
    letter-spacing: 3px;
    color: #777;
    text-transform: uppercase;
  }
  #hits {
    font-size: 2rem;
    font-weight: 700;
    color: #00F7FF;
    text-shadow: 0 0 20px rgba(0,247,255,0.6);
  }
  #combo {
    font-size: 1.1rem;
    font-weight: 600;
    color: #FA00FF;
    text-shadow: 0 0 15px rgba(250,0,255,0.6);
  }
  #hint {
    position: fixed;
    bottom: 2rem;
    left: 0;
    right: 0;
    text-align: center;
    color: #666;
    font-size: 0.85rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    z-index: 5;
    pointer-events: none;
    transition: opacity 0.6s ease;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }
</style>
</head>
<body>
  <div id="hud">
    <a href="index.html">&larr; ADHD LAB</a>
    <div id="stats">
      <div class="label">Hits</div>
      <div id="hits">0</div>
      <div id="combo"></div>
    </div>
  </div>
  <div id="hint">Punch the ball</div>
  <canvas id="bag"></canvas>

<script>
(function () {
  const canvas = document.getElementById('bag');
  const ctx = canvas.getContext('2d');
  const hitsEl = document.getElementById('hits');
  const comboEl = document.getElementById('combo');
  const hintEl = document.getElementById('hint');

  let W, H, dpr;
  function resize() {
    dpr = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    pivot.x = W / 2;
  }

  // ---- pivot / rope / ball state ----
  const pivot = { x: 0, y: 26 };
  const ROPE_LEN = 190;
  const BALL_R = 58;
  const GRAVITY = 9.0;      // angular gravity term (g/L baked in)
  const DAMPING = 0.55;     // air resistance
  const K_STRETCH = 40;     // rope stiffness pulling back to ROPE_LEN

  let theta = 0;            // angle from vertical (radians)
  let omega = 0;            // angular velocity
  let ropeLen = ROPE_LEN;   // current rope length (for punch "stretch/snap")
  let ropeVel = 0;

  let spin = 0;             // visual spin of the ball texture
  let spinVel = 0;

  let squash = 1;           // squash/stretch on impact
  let squashVel = 0;

  let hits = 0;
  let combo = 0;
  let lastHitTime = 0;

  function ballPos() {
    return {
      x: pivot.x + Math.sin(theta) * ropeLen,
      y: pivot.y + Math.cos(theta) * ropeLen
    };
  }

  function punch(clickX, clickY) {
    const b = ballPos();
    const dx = clickX - b.x;
    const dy = clickY - b.y;
    const dist = Math.hypot(dx, dy);
    if (dist > BALL_R * 1.6) return false; // missed

    // tangential direction at the ball (perpendicular to the rope)
    const tx = Math.cos(theta);
    const ty = -Math.sin(theta);

    // push direction: away from where the user clicked, relative to ball center
    let px = -dx, py = -dy;
    const plen = Math.hypot(px, py) || 1;
    px /= plen; py /= plen;

    const tangentialForce = px * tx + py * ty;
    const STRENGTH = 6.5;
    omega += tangentialForce * STRENGTH;

    // radial "give" — the rope stretches slightly on impact, like real elastic hangs
    const radial = -(px * Math.sin(theta) + py * Math.cos(theta));
    ropeVel += radial * 30;

    spinVel += (Math.random() > 0.5 ? 1 : -1) * (4 + Math.random() * 4);
    squashVel += 6;

    hits++;
    const now = performance.now();
    combo = (now - lastHitTime < 900) ? combo + 1 : 1;
    lastHitTime = now;
    hitsEl.textContent = hits;
    comboEl.textContent = combo > 1 ? combo + 'x COMBO' : '';
    hintEl.style.opacity = '0';

    spawnImpactRing(b.x, b.y);
    return true;
  }

  // ---- impact ring particles for juice ----
  const rings = [];
  function spawnImpactRing(x, y) {
    rings.push({ x, y, r: BALL_R * 0.6, alpha: 0.9 });
  }

  // ---- input ----
  function toLocal(e) {
    const rect = canvas.getBoundingClientRect();
    const cx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    const cy = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
    return { x: cx, y: cy };
  }
  canvas.addEventListener('mousedown', (e) => punch(...Object.values(toLocal(e))));
  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const p = toLocal(e);
    punch(p.x, p.y);
  }, { passive: false });

  // ---- physics step ----
  let lastT = performance.now();
  function step(now) {
    let dt = (now - lastT) / 1000;
    lastT = now;
    dt = Math.min(dt, 0.033);

    // pendulum angular dynamics
    const angAccel = -(GRAVITY / (ropeLen / 100)) * Math.sin(theta) - DAMPING * omega;
    omega += angAccel * dt;
    theta += omega * dt;

    // rope length spring back to rest length
    const ropeAccel = -K_STRETCH * (ropeLen - ROPE_LEN) - 8 * ropeVel;
    ropeVel += ropeAccel * dt;
    ropeLen += ropeVel * dt;

    // spin decay
    spinVel *= 0.96;
    spin += spinVel * dt;

    // squash decay (spring back to 1)
    const squashAccel = -50 * (squash - 1) - 6 * squashVel;
    squashVel += squashAccel * dt;
    squash += squashVel * dt;

    draw();
    requestAnimationFrame(step);
  }

  function drawChain(x1, y1, x2, y2) {
    const segs = 8;
    ctx.save();
    ctx.strokeStyle = '#3a3a3a';
    ctx.lineWidth = 3;
    ctx.beginPath();
    for (let i = 0; i <= segs; i++) {
      const t = i / segs;
      const x = x1 + (x2 - x1) * t;
      const y = y1 + (y2 - y1) * t;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();

    // link glints
    ctx.fillStyle = '#555';
    for (let i = 1; i < segs; i += 2) {
      const t = i / segs;
      const x = x1 + (x2 - x1) * t;
      const y = y1 + (y2 - y1) * t;
      ctx.beginPath();
      ctx.arc(x, y, 2.4, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // mount bracket at top
    ctx.save();
    ctx.fillStyle = '#111';
    ctx.strokeStyle = '#00F7FF';
    ctx.lineWidth = 2;
    ctx.shadowColor = '#00F7FF';
    ctx.shadowBlur = 12;
    roundRect(pivot.x - 55, 0, 110, 18, 6);
    ctx.fill();
    ctx.stroke();
    ctx.restore();

    const b = ballPos();

    // drop shadow on "floor" glow beneath, scaled by proximity
    const floorY = H - 40;
    const shadowScale = Math.max(0.25, 1 - (floorY - b.y) / (H));
    ctx.save();
    ctx.globalAlpha = 0.35 * shadowScale;
    const grad = ctx.createRadialGradient(b.x, floorY, 5, b.x, floorY, BALL_R * 1.3);
    grad.addColorStop(0, '#FA00FF');
    grad.addColorStop(1, 'rgba(250,0,255,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(b.x, floorY, BALL_R * 1.3 * shadowScale, BALL_R * 0.35 * shadowScale, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // chain
    drawChain(pivot.x, 18, b.x, b.y - BALL_R * 0.9);

    // impact rings
    for (let i = rings.length - 1; i >= 0; i--) {
      const r = rings[i];
      r.r += 3.2;
      r.alpha -= 0.045;
      if (r.alpha <= 0) { rings.splice(i, 1); continue; }
      ctx.save();
      ctx.globalAlpha = r.alpha;
      ctx.strokeStyle = '#00F7FF';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    drawBall(b.x, b.y);
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function drawBall(x, y) {
    const rx = BALL_R * (2 - squash);
    const ry = BALL_R * squash;

    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(theta * 0.15);

    // base sphere: cyan-to-magenta diagonal blend
    const base = ctx.createLinearGradient(-rx, -ry, rx, ry);
    base.addColorStop(0, '#00F7FF');
    base.addColorStop(0.5, '#6A5CFF');
    base.addColorStop(1, '#FA00FF');
    ctx.beginPath();
    ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2);
    ctx.fillStyle = base;
    ctx.fill();

    // rim glow
    ctx.save();
    ctx.clip();
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.ellipse(0, 0, rx - 3, ry - 3, 0, 0, Math.PI * 2);
    ctx.stroke();

    // seam panels (like a real speed bag) — spin with the ball
    ctx.rotate(spin);
    ctx.strokeStyle = 'rgba(0,0,0,0.35)';
    ctx.lineWidth = 2.5;
    for (let i = 0; i < 3; i++) {
      ctx.save();
      ctx.rotate((Math.PI / 3) * i);
      ctx.beginPath();
      ctx.ellipse(0, 0, rx * 0.98, ry * 0.35, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }
    ctx.restore(); // undo clip+spin

    // inner shading for volume (darker lower-right)
    const shade = ctx.createRadialGradient(rx * 0.25, -ry * 0.3, rx * 0.1, 0, 0, rx * 1.1);
    shade.addColorStop(0, 'rgba(255,255,255,0)');
    shade.addColorStop(0.7, 'rgba(0,0,0,0)');
    shade.addColorStop(1, 'rgba(0,0,0,0.45)');
    ctx.beginPath();
    ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2);
    ctx.fillStyle = shade;
    ctx.fill();

    // specular highlight (glossy shine)
    const shine = ctx.createRadialGradient(-rx * 0.35, -ry * 0.45, 1, -rx * 0.35, -ry * 0.45, rx * 0.55);
    shine.addColorStop(0, 'rgba(255,255,255,0.85)');
    shine.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.beginPath();
    ctx.ellipse(-rx * 0.35, -ry * 0.45, rx * 0.5, ry * 0.35, -0.4, 0, Math.PI * 2);
    ctx.fillStyle = shine;
    ctx.fill();

    // outer stroke
    ctx.beginPath();
    ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2);
    ctx.lineWidth = 2;
    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.stroke();

    ctx.restore();
  }

  window.addEventListener('resize', resize);
  resize();
  requestAnimationFrame(step);
})();
</script>
</body>
</html>
