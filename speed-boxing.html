<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Speed Boxing — ADHD LAB</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    color: #fff;
    font-family: 'Fredoka', sans-serif;
    overflow: hidden;
    height: 100%;
    touch-action: none;
  }
  #hud {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.5rem;
    z-index: 5;
    pointer-events: none;
  }
  #hud a {
    pointer-events: auto;
    color: #00F7FF;
    text-decoration: none;
    font-weight: 600;
    font-size: 0.9rem;
    border: 1px solid #00F7FF;
    padding: 0.4rem 0.9rem;
    border-radius: 999px;
    transition: all 0.2s ease;
  }
  #hud a:hover {
    background: #00F7FF;
    color: #000;
  }
  #stats {
    text-align: right;
    line-height: 1.3;
  }
  #stats .label {
    font-size: 0.65rem;
    letter-spacing: 3px;
    color: #777;
    text-transform: uppercase;
  }
  #hits {
    font-size: 2rem;
    font-weight: 700;
    color: #00F7FF;
    text-shadow: 0 0 20px rgba(0,247,255,0.6);
  }
  #combo {
    font-size: 1.1rem;
    font-weight: 600;
    color: #FA00FF;
    text-shadow: 0 0 15px rgba(250,0,255,0.6);
  }
  #hint {
    position: fixed;
    bottom: 2rem;
    left: 0;
    right: 0;
    text-align: center;
    color: #666;
    font-size: 0.85rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    z-index: 5;
    pointer-events: none;
    transition: opacity 0.6s ease;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }
</style>
</head>
<body>
  <div id="hud">
    <a href="index.html">&larr; ADHD LAB</a>
    <div id="stats">
      <div class="label">Hits</div>
      <div id="hits">0</div>
      <div id="combo"></div>
    </div>
  </div>
  <div id="hint">Punch the bag — alternate sides to keep it spinning</div>
  <canvas id="bag"></canvas>

<script>
(function () {
  const canvas = document.getElementById('bag');
  const ctx = canvas.getContext('2d');
  const hitsEl = document.getElementById('hits');
  const comboEl = document.getElementById('combo');
  const hintEl = document.getElementById('hint');

  let W, H, dpr;
  function resize() {
    dpr = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    pivot.x = W / 2;
  }

  // ---- mount / swivel / bag geometry ----
  const pivot = { x: 0, y: 24 };   // top mounting platform
  const SWIVEL_LEN = 66;           // short rigid swivel arm (real speed bags hang tight, not on a long chain)
  const BAG_W = 96;                // max belly width
  const BAG_H = 150;               // neck-to-tip height

  // ---- spherical-pendulum physics: two independent axes at the same
  // natural frequency produce the tight elliptical "orbit" a real speed
  // bag settles into once it's rhythmically hit from alternating sides ----
  const W0 = 13.5;      // angular stiffness (rad/s) — short swivel = fast, snappy oscillation
  const DAMPING = 3.0;  // decay rate — settles in ~1-1.5s, like a real bag between combos
  const MAX_ANGLE = 1.05; // soft clamp (~60deg) so it can't flip past horizontal

  let ax = 0, avx = 0;   // left-right swing
  let ay = 0, avy = 0;   // toward/away "orbit" component (rendered as depth+bob)

  let spin = 0, spinVel = 0;      // texture spin so seams tumble with real motion
  let squash = 1, squashVel = 0;  // impact squash/stretch

  let hits = 0;
  let combo = 0;
  let lastHitTime = 0;

  // The bag is a rigid body hanging from the neck (swivel attachment).
  // Rotation happens AT the neck, not the belly center — exactly like a
  // real pendulum bob — so the tip sweeps a wide arc while the neck stays
  // pinned near the swivel. ay adds a small extra lean, giving the whole
  // body a slight conical "orbit" tilt instead of pure side-to-side.
  function bagState() {
    const depthScale = 1 + 0.18 * Math.sin(ay);
    const rotation = ax + ay * 0.15;
    const neckX = pivot.x + Math.sin(ax) * SWIVEL_LEN;
    const neckY = pivot.y + Math.cos(ax) * SWIVEL_LEN;
    const bellyLen = BAG_H * 0.5 * depthScale;
    return {
      neckX, neckY, rotation, depthScale,
      x: neckX + Math.sin(rotation) * bellyLen,
      y: neckY + Math.cos(rotation) * bellyLen
    };
  }

  function punch(clickX, clickY) {
    const b = bagState();
    const dx = clickX - b.x;
    const dy = clickY - b.y;
    const dist = Math.hypot(dx, dy);
    if (dist > Math.max(BAG_W, BAG_H) * 0.7) return false; // missed

    // push direction: away from where the user clicked, relative to bag center
    let px = -dx, py = -dy;
    const plen = Math.hypot(px, py) || 1;
    px /= plen; py /= plen;

    const STRENGTH = 10.5;
    avx += px * STRENGTH;
    avy += (py * 0.55 + (Math.random() - 0.5) * 0.4) * STRENGTH * 0.5;

    spinVel += (px >= 0 ? 1 : -1) * (5 + Math.random() * 5);
    squashVel += 7;

    hits++;
    const now = performance.now();
    combo = (now - lastHitTime < 700) ? combo + 1 : 1;
    lastHitTime = now;
    hitsEl.textContent = hits;
    comboEl.textContent = combo > 1 ? combo + 'x COMBO' : '';
    hintEl.style.opacity = '0';

    spawnImpactRing(b.x, b.y);
    return true;
  }

  // ---- impact ring particles for juice ----
  const rings = [];
  function spawnImpactRing(x, y) {
    rings.push({ x, y, r: BAG_W * 0.4, alpha: 0.9 });
  }

  // ---- input ----
  function toLocal(e) {
    const rect = canvas.getBoundingClientRect();
    const cx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    const cy = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
    return { x: cx, y: cy };
  }
  canvas.addEventListener('mousedown', (e) => punch(...Object.values(toLocal(e))));
  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const p = toLocal(e);
    punch(p.x, p.y);
  }, { passive: false });

  // ---- physics step ----
  let lastT = performance.now();
  function step(now) {
    let dt = (now - lastT) / 1000;
    lastT = now;
    dt = Math.min(dt, 0.033);

    // two decoupled SHM axes at equal frequency -> elliptical orbit motion
    const axAccel = -(W0 * W0) * ax - DAMPING * avx;
    avx += axAccel * dt;
    ax += avx * dt;
    if (ax > MAX_ANGLE) { ax = MAX_ANGLE; avx *= -0.4; }
    if (ax < -MAX_ANGLE) { ax = -MAX_ANGLE; avx *= -0.4; }

    const ayAccel = -(W0 * W0) * ay - DAMPING * avy;
    avy += ayAccel * dt;
    ay += avy * dt;
    if (ay > MAX_ANGLE) { ay = MAX_ANGLE; avy *= -0.4; }
    if (ay < -MAX_ANGLE) { ay = -MAX_ANGLE; avy *= -0.4; }

    // spin decay
    spinVel *= 0.94;
    spin += spinVel * dt;

    // squash decay (spring back to 1)
    const squashAccel = -60 * (squash - 1) - 7 * squashVel;
    squashVel += squashAccel * dt;
    squash += squashVel * dt;

    draw();
    requestAnimationFrame(step);
  }

  function drawSwivel(x1, y1, x2, y2) {
    ctx.save();
    ctx.strokeStyle = '#3a3a3a';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();

    // metal swivel ring where the strap meets the bag
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(x2, y2, 5, 3.5, Math.atan2(y2 - y1, x2 - x1), 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // mount platform bracket at top
    ctx.save();
    ctx.fillStyle = '#111';
    ctx.strokeStyle = '#00F7FF';
    ctx.lineWidth = 2;
    ctx.shadowColor = '#00F7FF';
    ctx.shadowBlur = 12;
    roundRect(pivot.x - 55, 0, 110, 18, 6);
    ctx.fill();
    ctx.stroke();
    ctx.restore();

    const b = bagState();

    // drop shadow on "floor" glow beneath
    const floorY = H - 40;
    const shadowScale = Math.max(0.25, 1 - (floorY - b.y) / H);
    ctx.save();
    ctx.globalAlpha = 0.35 * shadowScale;
    const grad = ctx.createRadialGradient(b.x, floorY, 5, b.x, floorY, BAG_W * 1.3);
    grad.addColorStop(0, '#FA00FF');
    grad.addColorStop(1, 'rgba(250,0,255,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(b.x, floorY, BAG_W * 1.3 * shadowScale, BAG_W * 0.35 * shadowScale, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // swivel strap from mount to the bag's neck
    drawSwivel(pivot.x, 18, b.neckX, b.neckY);

    // impact rings
    for (let i = rings.length - 1; i >= 0; i--) {
      const r = rings[i];
      r.r += 3.4;
      r.alpha -= 0.05;
      if (r.alpha <= 0) { rings.splice(i, 1); continue; }
      ctx.save();
      ctx.globalAlpha = r.alpha;
      ctx.strokeStyle = '#00F7FF';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    drawBag(b);
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  // teardrop / pear silhouette matching a real speed bag: narrow neck at
  // top where the swivel strap attaches (local origin, y=0), bulging
  // belly, rounded bottom tip at y=h. Anchoring at the neck (not the
  // center) is what lets it swing like a real rigid pendulum bob.
  function bagPath(w, h) {
    const hw = w / 2;
    ctx.beginPath();
    ctx.moveTo(0, 0); // neck apex
    ctx.bezierCurveTo(hw * 0.55, h * 0.15, hw * 0.62, h * 0.65, hw * 0.5, h * 0.92);
    ctx.bezierCurveTo(hw * 0.42, h * 1.08, hw * 0.18, h, 0, h);
    ctx.bezierCurveTo(-hw * 0.18, h, -hw * 0.42, h * 1.08, -hw * 0.5, h * 0.92);
    ctx.bezierCurveTo(-hw * 0.62, h * 0.65, -hw * 0.55, h * 0.15, 0, 0);
    ctx.closePath();
  }

  function drawBag(b) {
    const w = BAG_W * b.depthScale * squash;
    const h = BAG_H * b.depthScale * (2 - squash);

    ctx.save();
    ctx.translate(b.neckX, b.neckY);
    ctx.rotate(b.rotation); // whole rigid body swings from the neck

    bagPath(w, h);
    ctx.save();
    ctx.clip();

    // base leather gradient: cyan neck fading to magenta belly
    const base = ctx.createLinearGradient(0, 0, 0, h);
    base.addColorStop(0, '#00F7FF');
    base.addColorStop(0.55, '#7A5CFF');
    base.addColorStop(1, '#FA00FF');
    ctx.fillStyle = base;
    ctx.fillRect(-w, -h * 0.2, w * 2, h * 1.4);

    // volume shading (darker toward the lower-right edge)
    const shade = ctx.createRadialGradient(w * 0.2, h * 0.3, w * 0.1, 0, h * 0.55, w * 1.3);
    shade.addColorStop(0, 'rgba(255,255,255,0)');
    shade.addColorStop(0.7, 'rgba(0,0,0,0)');
    shade.addColorStop(1, 'rgba(0,0,0,0.5)');
    ctx.fillStyle = shade;
    ctx.fillRect(-w, -h * 0.2, w * 2, h * 1.4);

    // horizontal seam band (equator stitching typical of a real speed bag)
    ctx.save();
    ctx.translate(0, spin * 6 % (h * 0.15)); // tiny tumble as it spins
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.ellipse(0, h * 0.58, w * 0.5, h * 0.06, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();

    // bottom cap seam where leather panels meet
    ctx.strokeStyle = 'rgba(0,0,0,0.35)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(0, h * 0.6);
    ctx.lineTo(0, h);
    ctx.stroke();

    // glossy specular highlight
    const shine = ctx.createRadialGradient(-w * 0.28, h * 0.35, 1, -w * 0.28, h * 0.35, w * 0.5);
    shine.addColorStop(0, 'rgba(255,255,255,0.8)');
    shine.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = shine;
    ctx.fillRect(-w, -h * 0.2, w * 2, h * 1.4);

    ctx.restore(); // undo clip

    // outer silhouette stroke
    bagPath(w, h);
    ctx.lineWidth = 2;
    ctx.strokeStyle = 'rgba(0,0,0,0.55)';
    ctx.stroke();

    ctx.restore();
  }

  window.addEventListener('resize', resize);
  resize();
  requestAnimationFrame(step);
})();
</script>
</body>
</html>
